<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Progress Card</title>
    <style>
        /* Fixed the local image reference so the card renders correctly in the browser. */
        body {
            margin: 0;
            min-height: 100vh;
            padding: 32px 20px;
            box-sizing: border-box;
            font-family: "Segoe UI", "Aptos", "Helvetica Neue", Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(73, 117, 255, 0.14), transparent 34%),
                linear-gradient(180deg, #f6f8fc 0%, #eef2f7 100%);
            color: #1f2937;
            position: relative;
            overflow: hidden;
            isolation: isolate;
            display: grid;
            place-items: center;
        }
        .dna-background {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.55;
        }
        .dna-background svg {
            position: absolute;
            top: 50%;
            width: min(34vw, 440px);
            height: min(92vh, 980px);
            transform: translateY(-50%);
            filter: drop-shadow(0 0 24px rgba(49, 94, 251, 0.22));
            animation: dnaFloat 12s ease-in-out infinite;
        }
        .dna-background svg.dna-left {
            left: -6vw;
        }
        .dna-background svg.dna-right {
            right: -6vw;
            transform: translateY(-50%) scaleX(-1);
        }
        .dna-strand {
            fill: none;
            stroke-linecap: round;
            stroke-width: 8;
            stroke-dasharray: 2 18;
            animation: dnaPulse 5.5s linear infinite;
        }
        .dna-strand.left {
            stroke: rgba(49, 94, 251, 0.78);
        }
        .dna-strand.right {
            stroke: rgba(22, 101, 52, 0.46);
            animation-delay: -2.75s;
        }
        .dna-rung {
            stroke: rgba(59, 130, 246, 0.34);
            stroke-width: 4;
        }
        .dna-glow {
            fill: none;
            stroke: rgba(148, 163, 184, 0.14);
            stroke-width: 24;
            stroke-linecap: round;
        }
        @keyframes dnaFloat {
            0%, 100% {
                transform: translateY(-50%) translateX(0);
            }
            50% {
                transform: translateY(-52%) translateX(-10px);
            }
        }
        @keyframes dnaPulse {
            from {
                stroke-dashoffset: 0;
            }
            to {
                stroke-dashoffset: -240;
            }
        }
        progress {
            width: 100%;
            height: 18px;
            border: none;
            border-radius: 999px;
            overflow: hidden;
            accent-color: #315efb;
        }
        details {
            margin-top: 18px;
            padding-top: 6px;
            border-top: 1px solid #e5e7eb;
        }
        details summary {
            cursor: pointer;
            font-weight: 600;
            color: #334155;
        }
        .box {
            width: min(760px, 100%);
            padding: 32px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(14px);
            box-sizing: border-box;
            display: grid;
            gap: 22px;
            position: relative;
            z-index: 1;
        }
        .box-title {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.05;
            letter-spacing: -0.04em;
        }
        .subtitle {
            margin: 0;
            max-width: 58ch;
            color: #475569;
            line-height: 1.65;
        }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .status-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #334155;
            margin: 0;
        }
        .status-value {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            color: #0f172a;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        button {
            appearance: none;
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            background: linear-gradient(135deg, #315efb, #1736a8);
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.01em;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(49, 94, 251, 0.28);
            transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 36px rgba(49, 94, 251, 0.33);
        }
        button:active {
            transform: translateY(0);
            opacity: 0.95;
        }
        #placeholderImage {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            border: 6px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 16px 30px rgba(15, 23, 42, 0.16);
            transition: transform 180ms ease, box-shadow 180ms ease;
        }
        #placeholderImage:hover {
            transform: scale(1.03);
            box-shadow: 0 20px 38px rgba(15, 23, 42, 0.2);
        }
        .media-row {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        .media-copy {
            flex: 1 1 280px;
            min-width: 0;
        }
        .links {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .links a {
            color: #315efb;
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover {
            text-decoration: underline;
        }
        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            .dna-background svg {
                width: min(56vw, 320px);
                opacity: 0.9;
            }

            .dna-background svg.dna-left {
                left: -20vw;
            }

            .dna-background svg.dna-right {
                right: -20vw;
            }

            .box {
                padding: 22px;
                border-radius: 22px;
            }

            #placeholderImage {
                width: 132px;
                height: 132px;
            }
        }
        #placeholderImage:hover {
            animation: spin 70ms linear infinite;
        }
        @keyframes spin{
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        </style>
</head>
<body>
    <div class="dna-background" aria-hidden="true">
        <svg class="dna-left" viewBox="0 0 420 920" preserveAspectRatio="none" role="presentation" aria-hidden="true">

                <line class="dna-rung" x1="162" y1="646" x2="258" y2="646" />
                <line class="dna-rung" x1="149" y1="712" x2="271" y2="712" />
                <line class="dna-rung" x1="162" y1="778" x2="258" y2="778" />
                <line class="dna-rung" x1="149" y1="844" x2="271" y2="844" />
            </g>
        </svg>
        <svg class="dna-right" viewBox="0 0 420 920" preserveAspectRatio="none" role="presentation" aria-hidden="true">
            <path class="dna-glow" d="M145 0 C260 92 145 184 260 276 S145 460 260 552 S145 736 260 828 S145 920 260 1012" />
            <path class="dna-glow" d="M275 0 C160 92 275 184 160 276 S275 460 160 552 S275 736 160 828 S275 920 160 1012" />
            <path class="dna-strand left" d="M145 0 C260 92 145 184 260 276 S145 460 260 552 S145 736 260 828 S145 920 260 1012" />
            <path class="dna-strand right" d="M275 0 C160 92 275 184 160 276 S275 460 160 552 S275 736 160 828 S275 920 160 1012" />
            <g>
                <line class="dna-rung" x1="149" y1="52" x2="271" y2="52" />
                <line class="dna-rung" x1="162" y1="118" x2="258" y2="118" />
                <line class="dna-rung" x1="149" y1="184" x2="271" y2="184" />
                <line class="dna-rung" x1="162" y1="250" x2="258" y2="250" />
                <line class="dna-rung" x1="149" y1="316" x2="271" y2="316" />
                <line class="dna-rung" x1="162" y1="382" x2="258" y2="382" />
                <line class="dna-rung" x1="149" y1="448" x2="271" y2="448" />
                <line class="dna-rung" x1="162" y1="514" x2="258" y2="514" />
                <line class="dna-rung" x1="149" y1="580" x2="271" y2="580" />
                <line class="dna-rung" x1="162" y1="646" x2="258" y2="646" />
                <line class="dna-rung" x1="149" y1="712" x2="271" y2="712" />
                <line class="dna-rung" x1="162" y1="778" x2="258" y2="778" />
                <line class="dna-rung" x1="149" y1="844" x2="271" y2="844" />
            </g>
        </svg>
    </div>
    <div class="box">
        <div>
            <h1 id="box" class="box-title">My Box</h1>
            <p class="subtitle">A cleaner presentation with a card layout, clearer hierarchy, and a progress interaction that feels more like a polished interface.</p>
        </div>

        <div class="status-row">
            <p class="status-label">Progress</p>
            <p class="status-value" id="progressLabel">0%</p>
        </div>

        <progress value="0" max="100" id="myProgress"></progress>

        <div class="controls">
            <button type="button">Increase progress</button>
        </div>

        <h3 id="popup" hidden style="margin: 0; color: #166534;">Progress is complete!</h3>

        <div class="media-row">
            <img id="placeholderImage" src="./how-to-draw-sharingan.jpg" alt="Decorative eye illustration">
            <div class="media-copy">
                <div class="links">
                    <a href="./gg.html">Open gg</a>
                </div>
                <details>
                    <summary>More Info</summary>
                    <p>This is additional information that can be expanded or collapsed.</p>
                </details>
            </div>
        </div>
    </div>
    <script>
        const button = document.querySelector('button');
        const progress = document.getElementById('myProgress');
        const progressLabel = document.getElementById('progressLabel');
        const popup = document.getElementById('popup');

        let resetTimer = null;

        function syncProgressLabel() {
            progressLabel.textContent = `${progress.value}%`;
        }

        function showCompletionState() {
            popup.hidden = false;
            button.disabled = true;

            if (resetTimer !== null) {
                clearTimeout(resetTimer);
            }

            resetTimer = window.setTimeout(() => {
                progress.value = 0;
                syncProgressLabel();
                popup.hidden = true;
                button.disabled = false;
            }, 1200);
        }

        button.addEventListener('click', function() {
            if (button.disabled) {
                return;
            }

            progress.value = Math.min(progress.value + 10, progress.max);
            syncProgressLabel();

            if (progress.value >= progress.max) {
                showCompletionState();
            }
        });

    </script>    
</body>
</html>
